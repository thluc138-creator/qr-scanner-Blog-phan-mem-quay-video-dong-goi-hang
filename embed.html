<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Video Recording - Quay Video Đóng Gói</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: white;
            min-height: 100vh;
        }
        
        .hidden { display: none !important; }
        
        /* ========== HEADER ========== */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            position: relative;
        }
        
        .header h1 { font-size: 18px; margin-bottom: 3px; }
        .header .subtitle { font-size: 11px; opacity: 0.9; }
        
        .header-info {
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 5px;
            font-size: 10px;
        }
        
        /* ========== DEVICE TABS ========== */
        .device-tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 3px solid #dee2e6;
        }
        
        .device-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: #f5f5f5;
            border: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .device-tab:hover { background: #e9ecef; }
        
        .device-tab.active {
            background: white;
            color: #667eea;
            font-weight: bold;
            border-bottom: 3px solid #667eea;
            margin-bottom: -3px;
        }
        
        /* ========== CONTROL PANEL ========== */
        .control-panel {
            padding: 12px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        
        .control-row {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .control-row:last-child { margin-bottom: 0; }
        
        .control-group {
            flex: 1;
            min-width: 140px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 11px;
            color: #333;
        }
        
        select {
            width: 100%;
            padding: 7px 10px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 12px;
            background: white;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 20px;
        }
        
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 20px;
            transition: 0.3s;
        }
        
        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        .toggle-switch input:checked + .toggle-slider { background: #667eea; }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }
        
        .toggle-label { font-size: 12px; font-weight: 500; }
        
        /* ========== ACTION BUTTONS ========== */
        .action-buttons {
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            justify-content: center;
            background: white;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-small { padding: 6px 12px; font-size: 11px; }
        
        /* ========== VIDEO CONTAINER ========== */
        .video-container {
            position: relative;
            background: #1a1a2e;
            aspect-ratio: 16/9;
            max-height: 400px;
        }
        
        #webcamVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        #currentOrderInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.3s;
            border-left: 3px solid #28a745;
        }
        
        #currentOrderInfo.show { opacity: 1; }
        #currentOrderInfo h3 { margin-bottom: 5px; color: #28a745; font-size: 12px; }
        
        #recordingIndicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(220,53,69,0.95);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 11px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        #fpsCounter {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 10px;
        }
        
        /* ========== COUNTER DISPLAY ========== */
        #counterDisplay {
            padding: 12px 15px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            text-align: center;
        }
        
        #counterDisplay h3 { margin-bottom: 3px; font-size: 13px; }
        .counter-info { font-size: 14px; }
        .counter-info strong { font-size: 18px; }
        
        /* ========== HISTORY SECTION ========== */
        .history-section {
            padding: 12px 15px;
            background: white;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .history-header h3 { font-size: 14px; color: #333; }
        
        .search-box input {
            padding: 6px 10px;
            border: 1px solid #dee2e6;
            border-radius: 15px;
            font-size: 11px;
            width: 150px;
        }
        
        #historyList {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 6px;
        }
        
        .history-item {
            display: grid;
            grid-template-columns: 40px 1fr 75px 55px 55px;
            gap: 6px;
            padding: 8px 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 10px;
            align-items: center;
        }
        
        .history-item:hover { background: #f8f9fa; }
        .history-item:last-child { border-bottom: none; }
        
        .order-number { color: #6c757d; font-weight: 500; }
        .qr-code { font-weight: 600; color: #333; word-break: break-all; }
        .order-date { color: #6c757d; }
        .order-time { color: #667eea; font-weight: 500; }
        .order-duration { color: #28a745; }
        
        .empty-history {
            text-align: center;
            padding: 25px;
            color: #999;
            font-size: 12px;
        }
        
        .history-actions {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            justify-content: center;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }
        
        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 10px 18px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 1000;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.warning { background: #ffc107; color: #333; }
        .toast.error { background: #dc3545; }
        
        /* ========== RESPONSIVE ========== */
        @media (max-width: 500px) {
            .control-row { flex-direction: column; }
            .control-group { width: 100%; min-width: auto; }
            .history-item { grid-template-columns: 30px 1fr 60px 50px; }
            .order-duration { display: none; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>📷 QR Scanner Video Recording</h1>
        <div class="subtitle">Quay video đóng gói - Bằng chứng giao hàng</div>
        <div class="header-info">🆓 FREE - Unlimited / Miễn phí - Không giới hạn</div>
    </div>
    
    <!-- Device Tabs -->
    <div class="device-tabs">
        <button class="device-tab active" id="cameraTab">📷 Camera Scan</button>
        <button class="device-tab" id="scannerTab">📟 Barcode Scanner</button>
    </div>
    
    <!-- Control Panel -->
    <div class="control-panel">
        <div class="control-row">
            <div class="control-group">
                <label>Camera:</label>
                <select id="cameraSelect">
                    <option value="">Đang tải...</option>
                </select>
            </div>
            <div class="control-group">
                <label>Chất lượng:</label>
                <select id="qualitySelect">
                    <option value="1080p30">Full HD 30fps</option>
                    <option value="1080p60" selected>Full HD 60fps</option>
                </select>
            </div>
        </div>
        
        <div class="control-row">
            <div class="control-group">
                <label>Bitrate:</label>
                <select id="bitrateSelect">
                    <option value="8">8 Mbps</option>
                    <option value="10">10 Mbps</option>
                    <option value="12" selected>12 Mbps</option>
                </select>
            </div>
            <div class="control-group">
                <label>Ghi trước quét:</label>
                <select id="preBufferSelect">
                    <option value="3000">3 giây</option>
                    <option value="5000" selected>5 giây</option>
                </select>
            </div>
        </div>
        
        <div class="control-row">
            <div class="control-group">
                <label>Ghi sau quét:</label>
                <select id="postBufferSelect">
                    <option value="3000" selected>3 giây</option>
                    <option value="5000">5 giây</option>
                </select>
            </div>
            <div class="toggle-group">
                <label class="toggle-switch">
                    <input type="checkbox" id="audioToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">🎤 Ghi âm</span>
            </div>
        </div>
    </div>
    
    <!-- Action Buttons -->
    <div class="action-buttons">
        <button id="startBtn" class="btn btn-primary">🎬 Bắt đầu</button>
        <button id="stopBtn" class="btn btn-danger hidden">⏹️ Dừng</button>
    </div>
    
    <!-- Video Container -->
    <div class="video-container">
        <video id="webcamVideo" autoplay playsinline muted></video>
        
        <div id="currentOrderInfo">
            <h3>📦 Đang ghi video</h3>
            <div>Mã QR: <strong id="currentBarcode">-</strong></div>
            <div>Thời gian: <span id="currentTimer">00:00:00</span></div>
        </div>
        
        <div id="recordingIndicator" class="hidden">
            ⏺️ REC • <span id="recordingTime">00:00:00</span>
        </div>
        
        <div id="fpsCounter" class="hidden">
            FPS: <span id="fpsValue">0</span>
        </div>
    </div>
    
    <!-- Counter Display -->
    <div id="counterDisplay">
        <h3>📊 Thống kê hôm nay</h3>
        <div class="counter-info">
            Đã quét: <strong id="scanCount">0</strong> đơn
        </div>
    </div>
    
    <!-- History Section -->
    <div class="history-section">
        <div class="history-header">
            <h3>📜 Lịch sử quét</h3>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Tìm mã QR...">
            </div>
        </div>
        <div id="historyList">
            <div class="empty-history">Chưa có lịch sử quét</div>
        </div>
    </div>
    
    <!-- History Actions -->
    <div class="history-actions">
        <button id="exportExcelBtn" class="btn btn-secondary btn-small">📊 Xuất Excel</button>
        <button id="deleteBtn" class="btn btn-danger btn-small">🗑️ Xóa lịch sử</button>
    </div>
    
    <!-- Toast -->
    <div id="toast" class="toast"></div>
    
    <!-- jsQR Library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <script>
    (function() {
        'use strict';
        
        // ========== CONFIGURATION ==========
        var STORAGE_KEY = 'qrScannerOrdersBlog';
        var MAX_ORDERS = 30000;
        var SCAN_LOCK_FIRST = 10000;
        var SCAN_LOCK_SECOND = 5000;
        
        var VIDEO_PRESETS = {
            '1080p30': { width: 1920, height: 1080, fps: 30, scanFPS: 3, scanScale: 0.5 },
            '1080p60': { width: 1920, height: 1080, fps: 60, scanFPS: 3, scanScale: 0.5 }
        };
        
        var BITRATE_OPTIONS = {
            '8': { value: 8000000 },
            '10': { value: 10000000 },
            '12': { value: 12000000 }
        };
        
        // ========== STATE ==========
        var state = {
            stream: null,
            mediaRecorder: null,
            recordedChunks: [],
            canvasStream: null,
            selectedQuality: '1080p60',
            selectedBitrate: '12',
            selectedCameraId: null,
            currentDevice: 'camera',
            isFirstScan: true,
            currentQR: null,
            scanBlocked: false,
            scanBlockedUntil: 0,
            recordingStartTime: null,
            scanTime: null,
            recordingTimerInterval: null,
            orders: [],
            isRecording: false,
            recordingCanvas: null,
            recordingCtx: null,
            scanCanvas: null,
            scanCtx: null,
            rafId: null,
            frameCount: 0,
            lastFpsTime: 0,
            currentFPS: 0,
            lastScanTime: 0,
            scanInterval: 333,
            audioEnabled: true,
            preBufferDuration: 5000,
            postBufferDuration: 3000
        };
        
        // ========== UTILITIES ==========
        function showToast(msg, type) {
            type = type || 'success';
            var toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }
        
        function playBeep() {
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var o = ctx.createOscillator(), g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = 800; o.type = 'square';
                g.gain.setValueAtTime(0.3, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                o.start(); o.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }
        
        function formatDuration(seconds) {
            var h = Math.floor(seconds / 3600);
            var m = Math.floor((seconds % 3600) / 60);
            var s = seconds % 60;
            return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }
        
        function getDateStr() {
            var d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }
        
        function getTimeStr() {
            var d = new Date();
            return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
        }
        
        // ========== CODEC ==========
        function getCompatibleCodec() {
            var codecs = [
                { mimeType: 'video/webm;codecs=vp8,opus', ext: 'webm' },
                { mimeType: 'video/webm;codecs=vp8', ext: 'webm' },
                { mimeType: 'video/webm', ext: 'webm' }
            ];
            for (var i = 0; i < codecs.length; i++) {
                if (MediaRecorder.isTypeSupported(codecs[i].mimeType)) return codecs[i];
            }
            return { mimeType: 'video/webm', ext: 'webm' };
        }
        
        // ========== CANVAS SETUP ==========
        function setupCanvases() {
            var preset = VIDEO_PRESETS[state.selectedQuality];
            
            if (!state.recordingCanvas) {
                state.recordingCanvas = document.createElement('canvas');
                state.recordingCtx = state.recordingCanvas.getContext('2d', { alpha: false });
            }
            state.recordingCanvas.width = preset.width;
            state.recordingCanvas.height = preset.height;
            
            if (!state.scanCanvas) {
                state.scanCanvas = document.createElement('canvas');
                state.scanCtx = state.scanCanvas.getContext('2d', { willReadFrequently: true });
            }
            
            var scale = preset.scanScale;
            state.scanCanvas.width = Math.round(preset.width * scale);
            state.scanCanvas.height = Math.round(preset.height * scale);
            state.scanInterval = Math.round(1000 / preset.scanFPS);
        }
        
        // ========== RENDER LOOP ==========
        function renderLoop(timestamp) {
            if (!state.stream) return;
            
            var video = document.getElementById('webcamVideo');
            var ctx = state.recordingCtx;
            var canvas = state.recordingCanvas;
            
            if (!video || !ctx || video.readyState < 2) {
                state.rafId = requestAnimationFrame(renderLoop);
                return;
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            drawTimestamp(ctx);
            
            var now = performance.now();
            if (now - state.lastScanTime >= state.scanInterval) {
                state.lastScanTime = now;
                if (state.currentDevice === 'camera') {
                    scanQRCode();
                }
            }
            
            state.frameCount++;
            if (timestamp - state.lastFpsTime >= 1000) {
                state.currentFPS = state.frameCount;
                state.frameCount = 0;
                state.lastFpsTime = timestamp;
                var fpsEl = document.getElementById('fpsValue');
                if (fpsEl) fpsEl.textContent = state.currentFPS;
            }
            
            state.rafId = requestAnimationFrame(renderLoop);
        }
        
        function drawTimestamp(ctx) {
            var now = new Date();
            var text = now.toLocaleString('vi-VN');
            ctx.font = 'bold 28px Arial';
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillText(text, 12, 42);
            ctx.fillStyle = '#00ff00';
            ctx.fillText(text, 10, 40);
        }
        
        // ========== QR SCANNING ==========
        function scanQRCode() {
            if (state.scanBlocked && Date.now() < state.scanBlockedUntil) return;
            if (state.scanBlocked && Date.now() >= state.scanBlockedUntil) {
                state.scanBlocked = false;
            }
            
            var video = document.getElementById('webcamVideo');
            if (!video || video.readyState < 2) return;
            
            var ctx = state.scanCtx;
            var canvas = state.scanCanvas;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if (typeof jsQR === 'undefined') return;
            
            var code = jsQR(imageData.data, canvas.width, canvas.height, {
                inversionAttempts: 'dontInvert'
            });
            
            if (code && code.data) {
                processQRCode(code.data);
            }
        }
        
        function processQRCode(qrData) {
            if (state.scanBlocked) return;
            
            playBeep();
            
            if (state.isFirstScan) {
                state.currentQR = qrData;
                state.isFirstScan = false;
                state.scanTime = Date.now();
                
                document.getElementById('currentBarcode').textContent = qrData;
                document.getElementById('currentOrderInfo').classList.add('show');
                document.getElementById('recordingIndicator').classList.remove('hidden');
                
                showToast('📹 Đang ghi: ' + qrData, 'success');
                
                state.scanBlocked = true;
                state.scanBlockedUntil = Date.now() + SCAN_LOCK_FIRST;
                
                var countdown = 10;
                var timer = setInterval(function() {
                    countdown--;
                    if (countdown > 0) {
                        showToast('⏱️ Chờ ' + countdown + 's...', 'warning');
                    } else {
                        clearInterval(timer);
                        state.scanBlocked = false;
                        showToast('✅ Quét lại mã để hoàn thành!', 'success');
                    }
                }, 1000);
                
            } else {
                if (qrData !== state.currentQR) {
                    showToast('⚠️ Mã không khớp!', 'error');
                    return;
                }
                
                showToast('✅ Đang lưu video...', 'success');
                
                state.scanBlocked = true;
                state.scanBlockedUntil = Date.now() + SCAN_LOCK_SECOND;
                
                setTimeout(function() {
                    saveRecording();
                }, state.postBufferDuration);
            }
        }
        
        // ========== RECORDING ==========
        function startRecording() {
            if (!state.stream || state.isRecording) return;
            
            setupCanvases();
            
            var preset = VIDEO_PRESETS[state.selectedQuality];
            var bitrate = BITRATE_OPTIONS[state.selectedBitrate].value;
            
            state.canvasStream = state.recordingCanvas.captureStream(preset.fps);
            
            if (state.audioEnabled && state.stream.getAudioTracks().length > 0) {
                state.stream.getAudioTracks().forEach(function(track) {
                    state.canvasStream.addTrack(track);
                });
            }
            
            var codec = getCompatibleCodec();
            
            try {
                state.mediaRecorder = new MediaRecorder(state.canvasStream, {
                    mimeType: codec.mimeType,
                    videoBitsPerSecond: bitrate
                });
            } catch (e) {
                state.mediaRecorder = new MediaRecorder(state.canvasStream);
            }
            
            state.recordedChunks = [];
            
            state.mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) state.recordedChunks.push(e.data);
            };
            
            state.mediaRecorder.start(1000);
            state.isRecording = true;
            state.recordingStartTime = Date.now();
            
            state.rafId = requestAnimationFrame(renderLoop);
            state.recordingTimerInterval = setInterval(updateRecordingTimer, 1000);
            
            document.getElementById('fpsCounter').classList.remove('hidden');
            
            console.log('[Recording] Started');
        }
        
        function stopRecording() {
            if (state.mediaRecorder && state.isRecording) {
                state.mediaRecorder.stop();
                state.isRecording = false;
            }
            
            if (state.rafId) {
                cancelAnimationFrame(state.rafId);
                state.rafId = null;
            }
            
            if (state.recordingTimerInterval) {
                clearInterval(state.recordingTimerInterval);
                state.recordingTimerInterval = null;
            }
            
            document.getElementById('currentOrderInfo').classList.remove('show');
            document.getElementById('recordingIndicator').classList.add('hidden');
            document.getElementById('fpsCounter').classList.add('hidden');
        }
        
        function saveRecording() {
            stopRecording();
            
            if (state.recordedChunks.length === 0) {
                showToast('❌ Không có video để lưu', 'error');
                resetScanState();
                return;
            }
            
            var blob = new Blob(state.recordedChunks, { type: 'video/webm' });
            var url = URL.createObjectURL(blob);
            
            var filename = state.currentQR + '_' + getDateStr() + '_' + getTimeStr().replace(/:/g, '') + '.webm';
            
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            var duration = Math.round((Date.now() - state.recordingStartTime) / 1000);
            var size = (blob.size / 1024 / 1024).toFixed(2) + ' MB';
            
            var order = {
                qr: state.currentQR,
                date: getDateStr(),
                time: getTimeStr(),
                duration: formatDuration(duration),
                size: size,
                filename: filename
            };
            
            state.orders.unshift(order);
            if (state.orders.length > MAX_ORDERS) state.orders.pop();
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.orders));
            
            updateCounter();
            renderHistory();
            
            showToast('✅ Đã lưu: ' + filename, 'success');
            
            resetScanState();
            setTimeout(startRecording, 500);
        }
        
        function resetScanState() {
            state.isFirstScan = true;
            state.currentQR = null;
            state.scanBlocked = false;
            state.recordedChunks = [];
        }
        
        function updateRecordingTimer() {
            if (!state.recordingStartTime) return;
            var elapsed = Math.floor((Date.now() - state.recordingStartTime) / 1000);
            var timerEl = document.getElementById('recordingTime');
            var currentTimerEl = document.getElementById('currentTimer');
            if (timerEl) timerEl.textContent = formatDuration(elapsed);
            if (currentTimerEl) currentTimerEl.textContent = formatDuration(elapsed);
        }
        
        // ========== CAMERA ==========
        function getCameras() {
            navigator.mediaDevices.enumerateDevices().then(function(devices) {
                var cameras = devices.filter(function(d) { return d.kind === 'videoinput'; });
                var select = document.getElementById('cameraSelect');
                select.innerHTML = '';
                
                cameras.forEach(function(cam, i) {
                    var option = document.createElement('option');
                    option.value = cam.deviceId;
                    option.textContent = cam.label || 'Camera ' + (i + 1);
                    select.appendChild(option);
                });
                
                if (cameras.length > 0 && !state.selectedCameraId) {
                    state.selectedCameraId = cameras[0].deviceId;
                }
                
                var saved = localStorage.getItem('selectedCamera');
                if (saved) {
                    var found = cameras.find(function(c) { return c.deviceId === saved; });
                    if (found) {
                        state.selectedCameraId = saved;
                        select.value = saved;
                    }
                }
            }).catch(function(e) {
                console.error('Error getting cameras:', e);
            });
        }
        
        function startCamera() {
            var preset = VIDEO_PRESETS[state.selectedQuality];
            
            var constraints = {
                video: {
                    deviceId: state.selectedCameraId ? { exact: state.selectedCameraId } : undefined,
                    width: { ideal: preset.width },
                    height: { ideal: preset.height },
                    frameRate: { ideal: preset.fps }
                },
                audio: state.audioEnabled
            };
            
            navigator.mediaDevices.getUserMedia(constraints).then(function(stream) {
                state.stream = stream;
                
                var video = document.getElementById('webcamVideo');
                video.srcObject = stream;
                
                document.getElementById('startBtn').classList.add('hidden');
                document.getElementById('stopBtn').classList.remove('hidden');
                
                setTimeout(startRecording, 500);
                
                showToast('✅ Camera đã bật - Sẵn sàng quét!', 'success');
                getCameras();
                
            }).catch(function(e) {
                console.error('Camera error:', e);
                showToast('❌ Không thể truy cập camera', 'error');
            });
        }
        
        function stopCamera() {
            stopRecording();
            
            if (state.stream) {
                state.stream.getTracks().forEach(function(track) { track.stop(); });
                state.stream = null;
            }
            
            var video = document.getElementById('webcamVideo');
            if (video) video.srcObject = null;
            
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('stopBtn').classList.add('hidden');
            
            resetScanState();
            showToast('Camera đã tắt', 'warning');
        }
        
        // ========== UI FUNCTIONS ==========
        function updateCounter() {
            var today = getDateStr();
            var todayOrders = state.orders.filter(function(o) { return o.date === today; });
            document.getElementById('scanCount').textContent = todayOrders.length;
        }
        
        function renderHistory(searchTerm) {
            searchTerm = searchTerm || '';
            var list = document.getElementById('historyList');
            
            var filtered = state.orders;
            if (searchTerm) {
                filtered = state.orders.filter(function(o) {
                    return o.qr.toLowerCase().indexOf(searchTerm.toLowerCase()) !== -1;
                });
            }
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-history">Chưa có lịch sử quét</div>';
                return;
            }
            
            var html = '';
            filtered.slice(0, 100).forEach(function(o, i) {
                html += '<div class="history-item">' +
                    '<span class="order-number">#' + (i + 1) + '</span>' +
                    '<span class="qr-code">' + o.qr + '</span>' +
                    '<span class="order-date">' + o.date + '</span>' +
                    '<span class="order-time">' + o.time + '</span>' +
                    '<span class="order-duration">' + o.duration + '</span>' +
                '</div>';
            });
            list.innerHTML = html;
        }
        
        function exportExcel() {
            if (state.orders.length === 0) {
                showToast('Chưa có dữ liệu', 'warning');
                return;
            }
            
            var headers = ['STT', 'Mã QR', 'Ngày', 'Giờ', 'Thời lượng', 'File'];
            var csv = '\uFEFF' + headers.join(',') + '\n';
            
            state.orders.forEach(function(o, i) {
                csv += [i + 1, '"' + o.qr + '"', o.date, o.time, o.duration, o.filename].join(',') + '\n';
            });
            
            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'QRScanner_' + getDateStr() + '.csv';
            a.click();
            
            showToast('✅ Đã xuất Excel', 'success');
        }
        
        function deleteOrders() {
            if (confirm('Xóa toàn bộ lịch sử?')) {
                state.orders = [];
                localStorage.setItem(STORAGE_KEY, '[]');
                updateCounter();
                renderHistory();
                showToast('Đã xóa', 'success');
            }
        }
        
        function selectDevice(device) {
            state.currentDevice = device;
            document.querySelectorAll('.device-tab').forEach(function(t) { t.classList.remove('active'); });
            document.getElementById(device === 'camera' ? 'cameraTab' : 'scannerTab').classList.add('active');
        }
        
        // ========== BARCODE SCANNER ==========
        var barcodeBuffer = '';
        var barcodeTimeout = null;
        
        function handleBarcodeInput(e) {
            if (state.currentDevice !== 'scanner') return;
            
            if (barcodeTimeout) clearTimeout(barcodeTimeout);
            
            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 3) {
                    processQRCode(barcodeBuffer);
                }
                barcodeBuffer = '';
            } else if (e.key.length === 1) {
                barcodeBuffer += e.key;
            }
            
            barcodeTimeout = setTimeout(function() {
                barcodeBuffer = '';
            }, 100);
        }
        
        // ========== INIT ==========
        function init() {
            console.log('[QR Scanner] Blog Edition v1.0');
            
            try {
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved) state.orders = JSON.parse(saved);
            } catch (e) {}
            
            state.selectedQuality = localStorage.getItem('selectedQuality') || '1080p60';
            state.selectedBitrate = localStorage.getItem('selectedBitrate') || '12';
            state.audioEnabled = localStorage.getItem('audioEnabled') !== 'false';
            state.preBufferDuration = parseInt(localStorage.getItem('preBufferDuration')) || 5000;
            state.postBufferDuration = parseInt(localStorage.getItem('postBufferDuration')) || 3000;
            
            document.getElementById('qualitySelect').value = state.selectedQuality;
            document.getElementById('bitrateSelect').value = state.selectedBitrate;
            document.getElementById('audioToggle').checked = state.audioEnabled;
            document.getElementById('preBufferSelect').value = state.preBufferDuration;
            document.getElementById('postBufferSelect').value = state.postBufferDuration;
            
            updateCounter();
            renderHistory();
            
            // Event listeners
            document.getElementById('startBtn').addEventListener('click', startCamera);
            document.getElementById('stopBtn').addEventListener('click', stopCamera);
            document.getElementById('exportExcelBtn').addEventListener('click', exportExcel);
            document.getElementById('deleteBtn').addEventListener('click', deleteOrders);
            document.getElementById('cameraTab').addEventListener('click', function() { selectDevice('camera'); });
            document.getElementById('scannerTab').addEventListener('click', function() { selectDevice('scanner'); });
            document.getElementById('searchInput').addEventListener('input', function(e) { renderHistory(e.target.value); });
            
            document.getElementById('cameraSelect').addEventListener('change', function() {
                state.selectedCameraId = this.value;
                localStorage.setItem('selectedCamera', this.value);
                if (state.stream) { stopCamera(); setTimeout(startCamera, 300); }
            });
            
            document.getElementById('qualitySelect').addEventListener('change', function() {
                state.selectedQuality = this.value;
                localStorage.setItem('selectedQuality', this.value);
                if (state.stream) { stopCamera(); setTimeout(startCamera, 300); }
            });
            
            document.getElementById('bitrateSelect').addEventListener('change', function() {
                state.selectedBitrate = this.value;
                localStorage.setItem('selectedBitrate', this.value);
            });
            
            document.getElementById('preBufferSelect').addEventListener('change', function() {
                state.preBufferDuration = parseInt(this.value);
                localStorage.setItem('preBufferDuration', this.value);
            });
            
            document.getElementById('postBufferSelect').addEventListener('change', function() {
                state.postBufferDuration = parseInt(this.value);
                localStorage.setItem('postBufferDuration', this.value);
            });
            
            document.getElementById('audioToggle').addEventListener('change', function() {
                state.audioEnabled = this.checked;
                localStorage.setItem('audioEnabled', this.checked);
                if (state.stream) { stopCamera(); setTimeout(startCamera, 300); }
            });
            
            document.addEventListener('keydown', handleBarcodeInput);
            
            // Auto request camera
            setTimeout(function() {
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(function(stream) {
                        stream.getTracks().forEach(function(t) { t.stop(); });
                        getCameras();
                    })
                    .catch(function(e) {
                        console.log('Waiting for camera permission');
                    });
            }, 500);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
