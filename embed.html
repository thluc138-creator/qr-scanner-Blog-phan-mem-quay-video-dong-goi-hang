<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Video Recording</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8f9fa;
            /* KHÔNG có scroll riêng - để parent control */
            overflow: hidden;
            height: 100%;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            background: white;
        }
        
        .hidden { display: none !important; }
        
        /* ========== HEADER ========== */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 15px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .header h1 { font-size: 16px; margin-bottom: 2px; }
        .header .subtitle { font-size: 10px; opacity: 0.9; }
        
        /* ========== TABS ========== */
        .tabs {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #667eea;
            flex-shrink: 0;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            border: none;
            font-size: 12px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab:hover { background: #e9ecef; }
        
        .tab.active {
            background: white;
            color: #667eea;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        
        /* ========== CONTROLS ========== */
        .controls {
            padding: 12px 15px;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        
        .control-row {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .control-row:last-child { margin-bottom: 0; }
        
        .control-group {
            flex: 1;
            min-width: 0;
        }
        
        .control-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #444;
            margin-bottom: 4px;
        }
        
        select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            background: white;
            cursor: pointer;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toggle {
            position: relative;
            width: 36px;
            height: 18px;
        }
        
        .toggle input { opacity: 0; width: 0; height: 0; }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 18px;
            transition: 0.3s;
        }
        
        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        .toggle input:checked + .toggle-slider { background: #667eea; }
        .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }
        
        .toggle-label { font-size: 12px; color: #555; }
        
        /* ========== BUTTONS ========== */
        .buttons {
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            background: white;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }
        
        .btn-secondary {
            background: #f39c12;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #e67e22;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        /* ========== VIDEO ========== */
        .video-section {
            position: relative;
            background: #1a1a2e;
            flex-shrink: 0;
        }
        
        #webcamVideo {
            width: 100%;
            height: 280px;
            object-fit: contain;
            display: block;
        }
        
        .video-overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 10px;
            opacity: 0;
            transition: opacity 0.3s;
            border-left: 3px solid #28a745;
        }
        
        .video-overlay.show { opacity: 1; }
        .video-overlay h4 { color: #28a745; font-size: 11px; margin-bottom: 3px; }
        
        .rec-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(231,76,60,0.95);
            color: white;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .fps-display {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 10px;
        }
        
        /* ========== STATS ========== */
        .stats {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 10px 15px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .stats-title { font-size: 12px; margin-bottom: 2px; }
        .stats-count { font-size: 20px; font-weight: bold; }
        .stats-total { font-size: 10px; opacity: 0.9; }
        
        /* ========== HISTORY ========== */
        .history {
            padding: 12px 15px;
            background: white;
            flex: 1;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .history-header h3 { font-size: 13px; color: #333; }
        
        .search-input {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 11px;
            width: 120px;
        }
        
        .history-list {
            border: 1px solid #eee;
            border-radius: 6px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .history-item {
            display: grid;
            grid-template-columns: 35px 1fr 70px 50px;
            gap: 5px;
            padding: 6px 8px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 10px;
            align-items: center;
        }
        
        .history-item:last-child { border-bottom: none; }
        .history-item:hover { background: #f9f9f9; }
        
        .h-num { color: #999; }
        .h-qr { font-weight: 600; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .h-date { color: #666; }
        .h-time { color: #667eea; font-weight: 500; }
        
        .empty-msg {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 11px;
        }
        
        /* ========== HISTORY ACTIONS ========== */
        .history-actions {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            background: #f8f9fa;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 11px;
        }
        
        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            z-index: 1000;
            white-space: nowrap;
        }
        
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.warning { background: #f39c12; }
        .toast.error { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>📷 QR Scanner Video Recording</h1>
            <div class="subtitle">Quay video đóng gói • Tự xóa đơn &gt; 60 ngày</div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" id="tabCamera">📷 Camera Scan</button>
            <button class="tab" id="tabScanner">📟 Barcode Scanner</button>
        </div>
        
        <!-- Controls -->
        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label>Camera:</label>
                    <select id="cameraSelect"><option>Đang tải...</option></select>
                </div>
                <div class="control-group">
                    <label>Chất lượng:</label>
                    <select id="qualitySelect">
                        <option value="1080p30">Full HD 30fps</option>
                        <option value="1080p60" selected>Full HD 60fps</option>
                    </select>
                </div>
            </div>
            <div class="control-row">
                <div class="control-group">
                    <label>Bitrate:</label>
                    <select id="bitrateSelect">
                        <option value="8">8 Mbps</option>
                        <option value="10">10 Mbps</option>
                        <option value="12" selected>12 Mbps</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Ghi trước quét:</label>
                    <select id="preBufferSelect">
                        <option value="3000">3 giây</option>
                        <option value="4000">4 giây</option>
                        <option value="5000" selected>5 giây</option>
                    </select>
                </div>
            </div>
            <div class="control-row">
                <div class="control-group">
                    <label>Ghi sau quét:</label>
                    <select id="postBufferSelect">
                        <option value="3000" selected>3 giây</option>
                        <option value="4000">4 giây</option>
                        <option value="5000">5 giây</option>
                    </select>
                </div>
                <div class="toggle-row">
                    <label class="toggle">
                        <input type="checkbox" id="audioToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">🎤 Ghi âm</span>
                </div>
            </div>
        </div>
        
        <!-- Buttons -->
        <div class="buttons">
            <button id="startBtn" class="btn btn-primary">🎬 Bắt đầu</button>
            <button id="stopBtn" class="btn btn-danger hidden">⏹️ Dừng</button>
            <button id="folderBtn" class="btn btn-secondary">📁 Mở thư mục</button>
        </div>
        
        <!-- Video -->
        <div class="video-section">
            <video id="webcamVideo" autoplay playsinline muted></video>
            <div class="video-overlay" id="orderInfo">
                <h4>📦 Đang ghi</h4>
                <div>Mã: <strong id="currentQR">-</strong></div>
                <div>Time: <span id="currentTime">00:00:00</span></div>
            </div>
            <div class="rec-indicator hidden" id="recIndicator">⏺ REC <span id="recTime">00:00</span></div>
            <div class="fps-display hidden" id="fpsDisplay">FPS: <span id="fpsValue">0</span></div>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stats-title">📊 Hôm nay</div>
            <div class="stats-count"><span id="todayCount">0</span> đơn</div>
            <div class="stats-total">Tổng: <span id="totalCount">0</span> / 100,000</div>
        </div>
        
        <!-- History -->
        <div class="history">
            <div class="history-header">
                <h3>📜 Lịch sử (<span id="historyCount">0</span>)</h3>
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Tìm mã...">
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-msg">Chưa có lịch sử</div>
            </div>
        </div>
        
        <!-- History Actions -->
        <div class="history-actions">
            <button id="exportBtn" class="btn btn-secondary btn-small">📊 Xuất Excel</button>
            <button id="deleteBtn" class="btn btn-danger btn-small">🗑️ Xóa tất cả</button>
        </div>
    </div>
    
    <!-- Toast -->
    <div id="toast" class="toast"></div>
    
    <!-- jsQR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <script>
    (function() {
        'use strict';
        
        // ========== CONFIG ==========
        var STORAGE_KEY = 'qrScannerBlog';
        var MAX_ORDERS = 100000;
        var AUTO_DELETE_DAYS = 60;
        
        var PRESETS = {
            '1080p30': { w: 1920, h: 1080, fps: 30 },
            '1080p60': { w: 1920, h: 1080, fps: 60 }
        };
        
        // ========== STATE ==========
        var state = {
            stream: null,
            recorder: null,
            chunks: [],
            orders: [],
            isRecording: false,
            isFirstScan: true,
            currentQR: null,
            scanBlocked: false,
            startTime: null,
            timerInterval: null,
            quality: '1080p60',
            bitrate: 12000000,
            audio: true,
            preBuf: 5000,
            postBuf: 3000,
            cameraId: null,
            device: 'camera',
            canvas: null,
            ctx: null,
            scanCanvas: null,
            scanCtx: null,
            rafId: null,
            canvasStream: null,
            folderHandle: null  // File System API
        };
        
        // ========== UTILS ==========
        function $(id) { return document.getElementById(id); }
        
        function toast(msg, type) {
            var t = $('toast');
            t.textContent = msg;
            t.className = 'toast show ' + (type || '');
            setTimeout(function() { t.classList.remove('show'); }, 2500);
        }
        
        function beep() {
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var o = ctx.createOscillator(), g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = 800; o.type = 'square';
                g.gain.setValueAtTime(0.3, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                o.start(); o.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }
        
        function pad(n) { return String(n).padStart(2, '0'); }
        
        function formatTime(sec) {
            var h = Math.floor(sec / 3600);
            var m = Math.floor((sec % 3600) / 60);
            var s = sec % 60;
            return pad(h) + ':' + pad(m) + ':' + pad(s);
        }
        
        function dateStr() {
            var d = new Date();
            return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
        }
        
        function timeStr() {
            var d = new Date();
            return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }
        
        function fileTimeStr() {
            var d = new Date();
            return pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
        }
        
        // ========== AUTO DELETE ==========
        function autoDelete() {
            var now = new Date();
            var cutoff = new Date(now.getTime() - AUTO_DELETE_DAYS * 86400000);
            var before = state.orders.length;
            state.orders = state.orders.filter(function(o) {
                return new Date(o.date) >= cutoff;
            });
            if (state.orders.length < before) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state.orders));
            }
        }
        
        // ========== FILE SYSTEM API - MỞ FOLDER ==========
        async function openFolder() {
            // Kiểm tra browser có hỗ trợ File System Access API không
            if ('showDirectoryPicker' in window) {
                try {
                    // Yêu cầu user chọn folder để lưu video
                    state.folderHandle = await window.showDirectoryPicker({
                        mode: 'readwrite',
                        startIn: 'downloads'
                    });
                    toast('✅ Đã chọn thư mục: ' + state.folderHandle.name, 'success');
                    
                    // Lưu permission để dùng lại
                    localStorage.setItem('folderName', state.folderHandle.name);
                    
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        toast('❌ Không thể mở thư mục', 'error');
                    }
                }
            } else {
                // Browser không hỗ trợ - hiện hướng dẫn
                toast('📁 Video lưu tại: Downloads', 'warning');
                alert('💡 Hướng dẫn mở thư mục Downloads:\n\n1. Nhấn Win + E\n2. Click "Downloads" ở menu trái\n\nHoặc mở: C:\\Users\\' + (navigator.userAgent.includes('Windows') ? '[Tên User]' : '') + '\\Downloads');
            }
        }
        
        // ========== SAVE VIDEO ==========
        async function saveVideo(blob, filename) {
            // Nếu đã chọn folder qua File System API
            if (state.folderHandle) {
                try {
                    var fileHandle = await state.folderHandle.getFileHandle(filename, { create: true });
                    var writable = await fileHandle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    toast('✅ Đã lưu: ' + filename, 'success');
                    return;
                } catch (e) {
                    console.log('File System API error, fallback to download');
                }
            }
            
            // Fallback: Download bình thường
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // ========== CAMERA ==========
        function getCameras() {
            navigator.mediaDevices.enumerateDevices().then(function(devs) {
                var cams = devs.filter(function(d) { return d.kind === 'videoinput'; });
                var sel = $('cameraSelect');
                sel.innerHTML = '';
                cams.forEach(function(c, i) {
                    var opt = document.createElement('option');
                    opt.value = c.deviceId;
                    opt.textContent = c.label || 'Camera ' + (i + 1);
                    sel.appendChild(opt);
                });
                if (cams.length && !state.cameraId) state.cameraId = cams[0].deviceId;
                var saved = localStorage.getItem('camera');
                if (saved && cams.find(function(c) { return c.deviceId === saved; })) {
                    state.cameraId = saved;
                    sel.value = saved;
                }
            });
        }
        
        function startCamera() {
            var p = PRESETS[state.quality];
            navigator.mediaDevices.getUserMedia({
                video: {
                    deviceId: state.cameraId ? { exact: state.cameraId } : undefined,
                    width: { ideal: p.w },
                    height: { ideal: p.h },
                    frameRate: { ideal: p.fps }
                },
                audio: state.audio
            }).then(function(stream) {
                state.stream = stream;
                $('webcamVideo').srcObject = stream;
                $('startBtn').classList.add('hidden');
                $('stopBtn').classList.remove('hidden');
                setTimeout(startRecording, 500);
                toast('✅ Camera đã bật!');
                getCameras();
            }).catch(function() {
                toast('❌ Lỗi camera', 'error');
            });
        }
        
        function stopCamera() {
            stopRecording();
            if (state.stream) {
                state.stream.getTracks().forEach(function(t) { t.stop(); });
                state.stream = null;
            }
            $('webcamVideo').srcObject = null;
            $('startBtn').classList.remove('hidden');
            $('stopBtn').classList.add('hidden');
            resetScan();
            toast('Camera đã tắt', 'warning');
        }
        
        // ========== RECORDING ==========
        function setupCanvas() {
            var p = PRESETS[state.quality];
            if (!state.canvas) {
                state.canvas = document.createElement('canvas');
                state.ctx = state.canvas.getContext('2d', { alpha: false });
            }
            state.canvas.width = p.w;
            state.canvas.height = p.h;
            
            if (!state.scanCanvas) {
                state.scanCanvas = document.createElement('canvas');
                state.scanCtx = state.scanCanvas.getContext('2d', { willReadFrequently: true });
            }
            state.scanCanvas.width = p.w / 2;
            state.scanCanvas.height = p.h / 2;
        }
        
        function renderLoop() {
            if (!state.stream) return;
            var video = $('webcamVideo');
            if (video.readyState >= 2) {
                state.ctx.drawImage(video, 0, 0, state.canvas.width, state.canvas.height);
                drawTimestamp();
                if (state.device === 'camera') scanQR();
            }
            state.rafId = requestAnimationFrame(renderLoop);
        }
        
        function drawTimestamp() {
            var text = new Date().toLocaleString('vi-VN');
            state.ctx.font = 'bold 24px Arial';
            state.ctx.fillStyle = 'rgba(0,0,0,0.5)';
            state.ctx.fillText(text, 12, 32);
            state.ctx.fillStyle = '#0f0';
            state.ctx.fillText(text, 10, 30);
        }
        
        function startRecording() {
            if (!state.stream || state.isRecording) return;
            setupCanvas();
            var p = PRESETS[state.quality];
            state.canvasStream = state.canvas.captureStream(p.fps);
            if (state.audio && state.stream.getAudioTracks().length) {
                state.stream.getAudioTracks().forEach(function(t) {
                    state.canvasStream.addTrack(t);
                });
            }
            
            var mime = 'video/webm;codecs=vp8,opus';
            if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';
            
            state.recorder = new MediaRecorder(state.canvasStream, {
                mimeType: mime,
                videoBitsPerSecond: state.bitrate
            });
            
            state.chunks = [];
            state.recorder.ondataavailable = function(e) {
                if (e.data.size > 0) state.chunks.push(e.data);
            };
            
            state.recorder.start(1000);
            state.isRecording = true;
            state.startTime = Date.now();
            
            state.rafId = requestAnimationFrame(renderLoop);
            state.timerInterval = setInterval(updateTimer, 1000);
            
            $('fpsDisplay').classList.remove('hidden');
        }
        
        function stopRecording() {
            if (state.recorder && state.isRecording) {
                state.recorder.stop();
                state.isRecording = false;
            }
            if (state.rafId) {
                cancelAnimationFrame(state.rafId);
                state.rafId = null;
            }
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            $('orderInfo').classList.remove('show');
            $('recIndicator').classList.add('hidden');
            $('fpsDisplay').classList.add('hidden');
        }
        
        function updateTimer() {
            if (!state.startTime) return;
            var sec = Math.floor((Date.now() - state.startTime) / 1000);
            var m = Math.floor(sec / 60), s = sec % 60;
            $('recTime').textContent = pad(m) + ':' + pad(s);
            $('currentTime').textContent = formatTime(sec);
        }
        
        // ========== QR SCAN ==========
        function scanQR() {
            if (state.scanBlocked) return;
            var video = $('webcamVideo');
            if (video.readyState < 2) return;
            
            state.scanCtx.drawImage(video, 0, 0, state.scanCanvas.width, state.scanCanvas.height);
            var img = state.scanCtx.getImageData(0, 0, state.scanCanvas.width, state.scanCanvas.height);
            
            if (typeof jsQR === 'undefined') return;
            var code = jsQR(img.data, state.scanCanvas.width, state.scanCanvas.height, { inversionAttempts: 'dontInvert' });
            
            if (code && code.data) processQR(code.data);
        }
        
        function processQR(data) {
            if (state.scanBlocked) return;
            beep();
            
            if (state.isFirstScan) {
                state.currentQR = data;
                state.isFirstScan = false;
                $('currentQR').textContent = data;
                $('orderInfo').classList.add('show');
                $('recIndicator').classList.remove('hidden');
                toast('📹 Đang ghi: ' + data);
                
                state.scanBlocked = true;
                var count = 10;
                var iv = setInterval(function() {
                    count--;
                    if (count > 0) {
                        toast('⏱️ Chờ ' + count + 's...', 'warning');
                    } else {
                        clearInterval(iv);
                        state.scanBlocked = false;
                        toast('✅ Quét lại để hoàn thành!');
                    }
                }, 1000);
            } else {
                if (data !== state.currentQR) {
                    toast('⚠️ Mã không khớp!', 'error');
                    return;
                }
                toast('✅ Đang lưu...');
                state.scanBlocked = true;
                setTimeout(saveRecording, state.postBuf);
            }
        }
        
        async function saveRecording() {
            stopRecording();
            if (!state.chunks.length) {
                toast('❌ Không có video', 'error');
                resetScan();
                return;
            }
            
            var blob = new Blob(state.chunks, { type: 'video/webm' });
            var filename = state.currentQR + '_' + dateStr() + '_' + fileTimeStr() + '.webm';
            
            // Sử dụng function saveVideo mới
            await saveVideo(blob, filename);
            
            var dur = Math.round((Date.now() - state.startTime) / 1000);
            var order = {
                qr: state.currentQR,
                date: dateStr(),
                time: timeStr(),
                duration: formatTime(dur),
                size: (blob.size / 1048576).toFixed(2) + ' MB',
                file: filename
            };
            
            state.orders.unshift(order);
            if (state.orders.length > MAX_ORDERS) state.orders.pop();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.orders));
            
            updateUI();
            toast('✅ Đã lưu: ' + filename);
            
            resetScan();
            setTimeout(startRecording, 500);
        }
        
        function resetScan() {
            state.isFirstScan = true;
            state.currentQR = null;
            state.scanBlocked = false;
            state.chunks = [];
        }
        
        // ========== UI ==========
        function updateUI() {
            var today = dateStr();
            var todayOrders = state.orders.filter(function(o) { return o.date === today; });
            $('todayCount').textContent = todayOrders.length;
            $('totalCount').textContent = state.orders.length.toLocaleString();
            $('historyCount').textContent = state.orders.length.toLocaleString();
            renderHistory();
        }
        
        function renderHistory(search) {
            var list = $('historyList');
            var filtered = state.orders;
            if (search) {
                filtered = state.orders.filter(function(o) {
                    return o.qr.toLowerCase().indexOf(search.toLowerCase()) !== -1;
                });
            }
            
            if (!filtered.length) {
                list.innerHTML = '<div class="empty-msg">Chưa có lịch sử</div>';
                return;
            }
            
            var html = '';
            filtered.slice(0, 50).forEach(function(o, i) {
                html += '<div class="history-item">' +
                    '<span class="h-num">#' + (i + 1) + '</span>' +
                    '<span class="h-qr">' + o.qr + '</span>' +
                    '<span class="h-date">' + o.date + '</span>' +
                    '<span class="h-time">' + o.time + '</span>' +
                '</div>';
            });
            list.innerHTML = html;
        }
        
        function exportExcel() {
            if (!state.orders.length) {
                toast('Chưa có dữ liệu', 'warning');
                return;
            }
            var csv = '\uFEFF' + ['STT', 'Mã QR', 'Ngày', 'Giờ', 'Thời lượng', 'Dung lượng', 'File'].join(',') + '\n';
            state.orders.forEach(function(o, i) {
                csv += [i + 1, '"' + o.qr + '"', o.date, o.time, o.duration, o.size, o.file].join(',') + '\n';
            });
            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'QRScanner_' + dateStr() + '.csv';
            a.click();
            toast('✅ Đã xuất Excel');
        }
        
        function deleteAll() {
            if (confirm('Xóa tất cả ' + state.orders.length + ' đơn?')) {
                state.orders = [];
                localStorage.setItem(STORAGE_KEY, '[]');
                updateUI();
                toast('Đã xóa');
            }
        }
        
        // ========== BARCODE SCANNER ==========
        var barcodeBuffer = '', barcodeTimer = null;
        function handleKeydown(e) {
            if (state.device !== 'scanner') return;
            if (barcodeTimer) clearTimeout(barcodeTimer);
            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 3) processQR(barcodeBuffer);
                barcodeBuffer = '';
            } else if (e.key.length === 1) {
                barcodeBuffer += e.key;
            }
            barcodeTimer = setTimeout(function() { barcodeBuffer = ''; }, 100);
        }
        
        // ========== INIT ==========
        function init() {
            console.log('[QR Scanner] Blog v6.0');
            
            try {
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved) state.orders = JSON.parse(saved);
            } catch(e) {}
            
            autoDelete();
            
            state.quality = localStorage.getItem('quality') || '1080p60';
            state.bitrate = parseInt(localStorage.getItem('bitrate') || '12') * 1000000;
            state.audio = localStorage.getItem('audio') !== 'false';
            state.preBuf = parseInt(localStorage.getItem('preBuf') || '5000');
            state.postBuf = parseInt(localStorage.getItem('postBuf') || '3000');
            
            $('qualitySelect').value = state.quality;
            $('bitrateSelect').value = state.bitrate / 1000000;
            $('audioToggle').checked = state.audio;
            $('preBufferSelect').value = state.preBuf;
            $('postBufferSelect').value = state.postBuf;
            
            updateUI();
            
            // Events
            $('startBtn').onclick = startCamera;
            $('stopBtn').onclick = stopCamera;
            $('folderBtn').onclick = openFolder;
            $('exportBtn').onclick = exportExcel;
            $('deleteBtn').onclick = deleteAll;
            
            $('tabCamera').onclick = function() {
                state.device = 'camera';
                $('tabCamera').classList.add('active');
                $('tabScanner').classList.remove('active');
            };
            $('tabScanner').onclick = function() {
                state.device = 'scanner';
                $('tabScanner').classList.add('active');
                $('tabCamera').classList.remove('active');
            };
            
            $('searchInput').oninput = function(e) { renderHistory(e.target.value); };
            
            $('cameraSelect').onchange = function() {
                state.cameraId = this.value;
                localStorage.setItem('camera', this.value);
                if (state.stream) { stopCamera(); setTimeout(startCamera, 300); }
            };
            
            $('qualitySelect').onchange = function() {
                state.quality = this.value;
                localStorage.setItem('quality', this.value);
                if (state.stream) { stopCamera(); setTimeout(startCamera, 300); }
            };
            
            $('bitrateSelect').onchange = function() {
                state.bitrate = parseInt(this.value) * 1000000;
                localStorage.setItem('bitrate', this.value);
            };
            
            $('preBufferSelect').onchange = function() {
                state.preBuf = parseInt(this.value);
                localStorage.setItem('preBuf', this.value);
            };
            
            $('postBufferSelect').onchange = function() {
                state.postBuf = parseInt(this.value);
                localStorage.setItem('postBuf', this.value);
            };
            
            $('audioToggle').onchange = function() {
                state.audio = this.checked;
                localStorage.setItem('audio', this.checked);
                if (state.stream) { stopCamera(); setTimeout(startCamera, 300); }
            };
            
            document.addEventListener('keydown', handleKeydown);
            
            // Request camera permission
            setTimeout(function() {
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(function(s) { s.getTracks().forEach(function(t) { t.stop(); }); getCameras(); })
                    .catch(function() {});
            }, 500);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
